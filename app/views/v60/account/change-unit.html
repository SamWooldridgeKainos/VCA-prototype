{% extends "layouts/main.html" %}
{% set pageName="Change unit" %}

{% block header %}
{% include "/v60/partials/header/none-selected.html" %}
{% endblock %}

{% block beforeContent %}
<a href="/v60/account" class="govuk-back-link">Back</a>
{% endblock %}

{% block content %}
<div class="govuk-grid-row">
    <div class="govuk-grid-column-one-half">

        <form action="/v60/account/change-unit-answer" method="post">

            <div class="govuk-form-group">
                <fieldset class="govuk-fieldset">
                    <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                        <h1 class="govuk-fieldset__heading">
                            Which unit are you in?
                        </h1>
                    </legend>

                    <div class="govuk-checkboxes" data-module="govuk-checkboxes">
                        <div class="govuk-checkboxes__item">
                            <input class="govuk-checkboxes__input" id="unit-1" name="unit" type="checkbox" value="CPS London South" {{ "checked" if 'CPS London South' in (data['unit'] or ['CPS London South']) }}>
                            <label class="govuk-label govuk-checkboxes__label" for="unit-1">
                                CPS London South
                            </label>
                        </div>
                        <div class="govuk-checkboxes__item">
                            <input class="govuk-checkboxes__input" id="unit-2" name="unit" type="checkbox" value="CPS London North" {{ "checked" if 'CPS London North' in (data['unit'] or ['CPS London South']) }}>
                            <label class="govuk-label govuk-checkboxes__label" for="unit-2">
                                CPS London North
                            </label>
                        </div>
                        <div class="govuk-checkboxes__item">
                            <input class="govuk-checkboxes__input" id="unit-3" name="unit" type="checkbox" value="CPS South East" {{ "checked" if 'CPS South East' in (data['unit'] or []) }}>
                            <label class="govuk-label govuk-checkboxes__label" for="unit-3">
                                CPS South East
                            </label>
                        </div>
                        <div class="govuk-checkboxes__item">
                            <input class="govuk-checkboxes__input" id="unit-4" name="unit" type="checkbox" value="CPS Thames and Chiltern" {{ "checked" if 'CPS Thames and Chiltern' in (data['unit'] or []) }}>
                            <label class="govuk-label govuk-checkboxes__label" for="unit-4">
                                CPS Thames and Chiltern
                            </label>
                        </div>
                        <div class="govuk-checkboxes__item">
                            <input class="govuk-checkboxes__input" id="unit-5" name="unit" type="checkbox" value="CPS Wessex" {{ "checked" if 'CPS Wessex' in (data['unit'] or []) }}>
                            <label class="govuk-label govuk-checkboxes__label" for="unit-5">
                                CPS Wessex
                            </label>
                        </div>
                        <div class="govuk-checkboxes__item">
                            <input class="govuk-checkboxes__input" id="unit-6" name="unit" type="checkbox" value="CPS East of England" {{ "checked" if 'CPS East of England' in (data['unit'] or []) }}>
                            <label class="govuk-label govuk-checkboxes__label" for="unit-6">
                                CPS East of England
                            </label>
                        </div>
                    </div>
                </fieldset>
            </div>

            <button class="govuk-button" data-module="govuk-button">
                Save and continue
            </button>
        </form>

    </div>
</div>
{% endblock %}
