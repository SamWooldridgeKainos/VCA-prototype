{% block content %}
<div class="app-identity-bar" style="box-shadow: none">
  <div class="app-identity-bar__container">
    <div class="app-identity-bar__details">
      <span class="app-identity-bar__title">
        <h1 class="govuk-heading-m">
          {{ data['victimSurname'] | upper }}, {{ data['victimForename'] }}
        </h1>
        <p class="govuk-body">Case reference: {{ data['caseUrn'] }}</p>
      </span>
    </div>
    <div class="app-identity-bar__actions">
      <div class="app-identity-bar__menu govuk-!-margin-top-2">
        <a href="/v51/victim/new-task/task-selection" class="govuk-button govuk-button--secondary govuk-!-margin-bottom-0 govuk-!-margin-right-2" data-module="govuk-button" data-govuk-button-init="">
          Create task
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
