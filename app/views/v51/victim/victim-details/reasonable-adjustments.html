{% extends "layouts/main.html" %}
{% set pageName="Reasonable adjustments" %}

{% block header %}
{% include "/v51/partials/header/none-selected.html" %}
{% endblock %}

{% block beforeContent %}
<a href="javascript:window.history.back()" class="govuk-back-link">Back</a>
{% endblock %}

{% block content %}
<div class="govuk-grid-row">
    <div class="govuk-grid-column-one-half">

      <form action="/v51/victim/victim-details/reasonable-adjustments-answer" method="post" accept-charset="UTF-8" id="myForm" name="myForm" onsubmit="return validateForm()">

        <div class="govuk-form-group" id="error-form-group-1">
          <h1 class="govuk-label-wrapper">
            <label class="govuk-label govuk-label--l" for="reasonable-adjustments">
              What reasonable adjustments does {{ data['victimForename'] }} {{ data['victimSurname'] }} need?
            </label>
          </h1>
          <textarea class="govuk-textarea" id="reasonable-adjustments" name="reasonableAdjustments" rows="5">{{ data['reasonableAdjustments'] }}</textarea>
        </div>

        <button type="submit" class="govuk-button" data-module="govuk-button">Save and continue</button>

      </form>
    </div>
  </div>
{% endblock %}

{% block pageScripts %}
<script src="/public/javascripts/shared/victim-details/reasonable-adjustments.js"></script>
{% endblock %}
