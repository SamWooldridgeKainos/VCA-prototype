{% extends "layouts/main.html" %}
{% set pageName="Log a follow-up" %}

{% block header %}
{% include "/v51/partials/header/none-selected.html" %}
{% endblock %}

{% block beforeContent %}
<a href="javascript:window.history.back()" class="govuk-back-link">Back</a>
{% endblock %}

{% block content %}
<div class="govuk-grid-row">
  <div class="govuk-grid-column-one-half">

    <form action="/v51/vcl/follow-up/log-follow-up-answer" method="post" accept-charset="UTF-8" id="myForm" name="myForm">

      <div class="govuk-form-group" id="error-form-group">
        <fieldset class="govuk-fieldset">

          <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
            <h1 class="govuk-fieldset__heading">
              What do you want to do?
            </h1>
          </legend>

          <div class="govuk-radios" id="radio-group">

            <div class="govuk-radios__item">
              <input type="radio" class="govuk-radios__input" id="follow-up-email" name="vclFollowUpType" value="email" {{ checked('vclFollowUpType','email') }}>
              <label class="govuk-label govuk-radios__label" for="follow-up-email">
                Log an email
              </label>
            </div>

            <div class="govuk-radios__item">
              <input type="radio" class="govuk-radios__input" id="follow-up-letter" name="vclFollowUpType" value="post" {{ checked('vclFollowUpType','post') }}>
              <label class="govuk-label govuk-radios__label" for="follow-up-letter">
                Log a letter
              </label>
            </div>

          </div>
        </fieldset>
      </div>

      <button type="submit" class="govuk-button" data-module="govuk-button">
        Continue
      </button>

    </form>

  </div>
</div>
{% endblock %}
